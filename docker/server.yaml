services:
  server:
    image: jrei/systemd-ubuntu:24.04

    container_name: server
    hostname: server

    privileged: true

    stdin_open: true
    tty: true

    ports:
      - "2222:22"
      - "6443:6443"

    cgroup: host

    tmpfs:
      - /run
      - /run/lock
      - /tmp

    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./setup.sh:/setup.sh

    cap_add:
      - SYS_ADMIN
      - NET_ADMIN

    devices:
      - /dev/net/tun:/dev/net/tun

    command: ["/sbin/init"]

    restart: unless-stopped

    networks:
      - net

networks:
  net:
    driver: bridge